<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#070c14;color:#f8fafc;font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
input,select,textarea,button{font-family:inherit}
button{cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:#1e2d3d;border-radius:3px}
.app{min-height:100vh}
/* TOP BAR */
.topbar{background:#0a0f1a;border-bottom:1px solid #1e2d3d;padding:11px 16px;display:flex;align-items:center;gap:10px;flex-wrap:wrap;position:sticky;top:0;z-index:50}
.topbar-title{flex:1;min-width:0}
.topbar-label{color:#F59E0B;font-family:monospace;font-size:9px;letter-spacing:3px}
.topbar-name{color:#f8fafc;font-size:15px;font-weight:800}
.body{padding:16px}
/* CARDS */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.card{background:#0f1621;border:1px solid #1e2d3d;border-radius:14px;padding:16px;cursor:pointer;position:relative;transition:border-color .2s,transform .15s}
.card:hover{border-color:#F59E0B;transform:translateY(-2px)}
.card.urgent{border-color:#7f1d1d}
.card.urgent:hover{border-color:#f87171}
/* BADGE */
.badge{border-radius:6px;padding:3px 8px;font-size:11px;font-weight:700;font-family:monospace;white-space:nowrap;border:1px solid}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:#000000cc;display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}
.modal{background:#0f1621;border:1px solid #1e2d3d;border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto}
/* FORM */
.field{margin-bottom:12px}
.field label{color:#64748b;font-size:10px;letter-spacing:1px;font-family:monospace;display:block;margin-bottom:4px}
.field input,.field select,.field textarea{width:100%;background:#1a2332;border:1px solid #2a3a4d;border-radius:8px;color:#f8fafc;padding:9px 11px;font-size:13px;outline:none}
.field input[type=date]{color-scheme:dark}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* TABLE */
table{width:100%;border-collapse:collapse}
th{color:#64748b;font-size:10px;font-family:monospace;letter-spacing:1px;padding:6px 10px;text-align:left;white-space:nowrap;border-bottom:1px solid #1e2d3d}
td{padding:8px 10px;font-size:12px;border-bottom:1px solid #0f1621}
tr:hover td{background:#0a0f1a}
/* CHECKLIST */
.check-item{display:flex;align-items:center;gap:8px;padding:10px 16px;border-bottom:1px solid #0f1621;transition:background .15s}
.check-item.nook{background:#1a0505}
.check-item.controllare{background:#1a1200}
.check-item.ok{background:#051205}
.check-item.non_presente{background:#0d0a1a}
/* RING */
.ring-wrap{position:relative;flex-shrink:0}
.ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;font-family:monospace}
/* TABS */
.tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:3px;margin-bottom:12px}
.tab{border-radius:9px;padding:8px 12px;font-weight:700;font-size:12px;white-space:nowrap;flex-shrink:0;border:1px solid #1e2d3d;background:#0f1621;color:#94a3b8;position:relative}
.tab.active{color:#000}
/* AVATAR */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-family:monospace;flex-shrink:0}
/* LOADING */
#loading{position:fixed;inset:0;background:#070c14;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:9999}
.spinner{width:40px;height:40px;border:3px solid #1e2d3d;border-top-color:#F59E0B;border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* PROGRESS BAR */
.prog-bar{height:4px;background:#1e2533;border-radius:4px;overflow:hidden}
.prog-fill{height:100%;border-radius:4px;transition:width .3s}
/* UTILS */
.flex{display:flex;align-items:center}
.gap4{gap:4px}.gap6{gap:6px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.wrap{flex-wrap:wrap}
.mono{font-family:monospace}
.bold{font-weight:700}
.hidden{display:none!important}
</style>
</head>

const OP_COLS = ["#F59E0B","#3B82F6","#10B981","#8B5CF6","#f87171","#38bdf8","#fb923c","#a78bfa"];
const opCol = n => { let h=0; for(const c of n) h=c.charCodeAt(0)+((h<<5)-h); return OP_COLS[Math.abs(h)%OP_COLS.length]; };
const nowTs = () => new Date().toLocaleString("it-IT",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});

const alertLv = (d,a) => d===null?null:d<0?"scaduto":d===0?"oggi":d<=(a||3)?"warning":"ok";
const h = (tag,attrs={},children=[]) => {
  const el = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v])=>{
    if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="class") el.className=v;
    else el.setAttribute(k,v);
  });
  children.forEach(c=>{ if(c===null||c===undefined)return; el.append(typeof c==="string"?c:c); });
  return el;
};

  "KIT GONFIAGGIO/GANCIO","ADBLUE","GANCIO TRAINO","TEST RIBALTABILE","REVISIONE BOMBOLE METANO/GPL"];

const SCYCLE_NNP = {pending:"ok",ok:"nook",nook:"controllare",controllare:"pending"};

const calcPct = cl => {let t=0,d=0;Object.values(cl).forEach(a=>a.forEach(i=>{t++;if(i.status!=="pending")d++;}));return t?Math.round(d/t*100):0;};
const secPct = items => items?.length?Math.round(items.filter(i=>i.status!=="pending").length/items.length*100):0;
const getCounts = cl => {const r={ok:0,nook:0,controllare:0,non_presente:0,pending:0};Object.values(cl).forEach(a=>a.forEach(i=>r[i.status]++));return r;};

// ── DB ───────────────────────────────────────────────────────────────────────
async function dbRead() {
  const r = await fetch(SB_URL+"/rest/v1/veicoli?id=eq.1&select=data",{headers:SB_HDR});
  if(!r.ok){const t=await r.text();throw new Error("SB "+r.status+": "+t.slice(0,80));}
  const rows = await r.json();
  if(!rows||rows.length===0) return {veicoli:[],archivio:[]};
  return rows[0].data||{veicoli:[],archivio:[]};
}
async function dbWrite(data) {
  const r = await fetch(SB_URL+"/rest/v1/veicoli?id=eq.1",{method:"PATCH",headers:SB_HDR,body:JSON.stringify({data,updated_at:new Date().toISOString()})});
  if(!r.ok){const t=await r.text();throw new Error("SB "+r.status+": "+t.slice(0,80));}
}

// ── STATE ────────────────────────────────────────────────────────────────────
let state = {
  op: null, veicoli: [], archivio: [], view: "lista",
  sel: null, fp: "tutti", loaded: false, loadError: null,
  syncing: false, sync: null, showExport: false, showArchivio: false,
  confirmArchivia: null, showScadModal: null,
};
function setState(patch) { Object.assign(state, patch); render(); }

// ── DB OPS ───────────────────────────────────────────────────────────────────
async function load(manual=false) {
  if(manual) setState({syncing:true});
  try {
    const db = await dbRead();
    Object.assign(state, {
      veicoli: db.veicoli||[],
      archivio: db.archivio||[],
      loadError: null,
      syncing: false,
      sync: new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit",second:"2-digit"})
    });
    // During background polling, only re-render if no modal is open
    const modalOpen = state.showLavori||state.showArchivio||state.showExport||state.confirmArchivia||state.showScadModal;
    if(manual || !modalOpen) render();
    else {
      // Just update the sync indicator silently without full re-render
      const syncEl = document.querySelector('.sync-lbl');
      if(syncEl) syncEl.textContent = "↺ "+state.sync;
    }
  } catch(e) {
    Object.assign(state, {
      loadError: e.message,
      syncing: false,
      sync: new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit",second:"2-digit"})
    });
    if(manual) render();
  }
}
async function save(veicoli) {
  setState({veicoli});
  try { const db=await dbRead(); await dbWrite({...db,veicoli}); } catch(e){ alert("Errore salvataggio: "+e.message); }
}
async function archiviaVeicolo(v) {
  try {
    const db=await dbRead();
    const archivio=[...(db.archivio||[]),{...v,archiviatoIl:nowTs()}];
    const veicoli=(db.veicoli||[]).filter(x=>x.id!==v.id);
    await dbWrite({...db,veicoli,archivio});
    setState({veicoli,archivio,confirmArchivia:null,view:"lista"});
  } catch(e){ alert("Errore archiviazione: "+e.message); }
}

// ── COMPONENTS ───────────────────────────────────────────────────────────────
function Avatar(name, size=26) {
  const c=opCol(name), ini=name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase();
  const el=h("div",{class:"av",style:{width:size+"px",height:size+"px",background:c+"33",border:"2px solid "+c,color:c,fontSize:(size*.38)+"px"}});
  el.textContent=ini; return el;
}

function Ring(pct, size=54, color="#F59E0B") {
  const r=(size-5)/2,ci=2*Math.PI*r;
  const svg=document.createElementNS("http://www.w3.org/2000/svg","svg");
  svg.setAttribute("width",size);svg.setAttribute("height",size);
  svg.style.transform="rotate(-90deg)";svg.style.flexShrink="0";
  const mk=(stroke,da="none")=>{const c=document.createElementNS("http://www.w3.org/2000/svg","circle");c.setAttribute("cx",size/2);c.setAttribute("cy",size/2);c.setAttribute("r",r);c.setAttribute("fill","none");c.setAttribute("stroke",stroke);c.setAttribute("stroke-width","5");if(da!=="none")c.setAttribute("stroke-dasharray",da);return c;};
  svg.appendChild(mk("#1e2533"));svg.appendChild(mk(color,(pct/100*ci)+" "+ci));
  const wrap=h("div",{class:"ring-wrap",style:{width:size+"px",height:size+"px"}});
  wrap.appendChild(svg);
  const lbl=h("div",{class:"ring-pct",style:{color,fontSize:Math.floor(size*.22)+"px"}});
  lbl.textContent=pct+"%";wrap.appendChild(lbl);
  return wrap;
}

}

// ── NUOVO VEICOLO ─────────────────────────────────────────────────────────────
function renderNuovoV() {
  let f={veicolo:"",targa:"",km:"",operatore:state.op,posizione:"in_arrivo",scadenza:"",alertDays:3,extra:buildExtra()};

  // Posizione
  const posField=h("div",{class:"field"});

// ── CARD ──────────────────────────────────────────────────────────────────────
function renderCard(v, onOpen, onDelete, onArchivia) {

  card.addEventListener("mouseenter",e=>{card.style.borderColor=urgent?"#f87171":"#F59E0B";card.style.transform="translateY(-2px)";});

  // Progress bars

  SECTIONS.forEach(s=>{
    const p=secPct(v.checklist[s.id]);
    const bw=h("div",{style:{flex:"1"}});
    const bg=h("div",{class:"prog-bar"});
    const fill=h("div",{class:"prog-fill",style:{width:p+"%",background:s.color}});
    bg.appendChild(fill);
    const ic=h("div",{style:{color:"#475569",fontSize:"9px",marginTop:"2px",textAlign:"center"}});ic.textContent=s.icon;
    bw.append(bg,ic);bars.appendChild(bw);
  });
  card.appendChild(bars);

  // Status counts
  const cts=h("div",{style:{marginTop:"8px",display:"flex",gap:"5px",flexWrap:"wrap"}});
  if(counts.nook>0){const b=h("span",{class:"badge",style:{background:SCOLORS.nook.bg,color:SCOLORS.nook.text,borderColor:SCOLORS.nook.border,fontSize:"10px"}});b.textContent="NON OK: "+counts.nook;cts.appendChild(b);}
  if(counts.controllare>0){const b=h("span",{class:"badge",style:{background:SCOLORS.controllare.bg,color:SCOLORS.controllare.text,borderColor:SCOLORS.controllare.border,fontSize:"10px"}});b.textContent="CONTR.: "+counts.controllare;cts.appendChild(b);}
  if(counts.ok>0){const b=h("span",{class:"badge",style:{background:SCOLORS.ok.bg,color:SCOLORS.ok.text,borderColor:SCOLORS.ok.border,fontSize:"10px"}});b.textContent="OK: "+counts.ok;cts.appendChild(b);}
  card.appendChild(cts);

  // Mini pending list
  const daFare=[];Object.values(v.checklist).forEach(items=>items.forEach(i=>{if(i.status==="nook"||i.status==="controllare")daFare.push(i);}));
  const nonVerif=Object.values(v.checklist).reduce((a,items)=>a+items.filter(i=>i.status==="pending").length,0);

        row.append(dot,lbl2);mini.appendChild(row);

      if(daFare.length>5){const more=h("div",{style:{color:"#475569",fontSize:"10px",paddingLeft:"10px"}});more.textContent="+"+( daFare.length-5)+" altri...";mini.appendChild(more);}

    card.appendChild(mini);
  }

  // Last log
  if(last){
    const logRow=h("div",{style:{marginTop:"8px",display:"flex",alignItems:"center",gap:"6px",borderTop:"1px solid #1e2533",paddingTop:"7px"}});
    logRow.appendChild(Avatar(last.op,16));
    const lt=h("span",{style:{color:"#475569",fontSize:"10px"}});
    const lo=h("span",{style:{color:opCol(last.op),fontWeight:"600"}});lo.textContent=last.op;
    lt.append(lo," · "+(last.a||last.msg||"")+" · "+last.t);logRow.appendChild(lt);card.appendChild(logRow);
  }
  return card;
}

function renderLavoriModal() {
  const bg=h("div",{class:"modal-bg",onClick:e=>{if(e.target===bg)setState({showLavori:false});}});
  const box=h("div",{style:{background:"#0f1621",border:"1px solid #0e4d6d",borderRadius:"16px",padding:"22px",width:"100%",maxWidth:"720px",maxHeight:"90vh",display:"flex",flexDirection:"column",gap:"12px"}});

  // Header
  const hdr=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}});
  const hl=h("div");
  const hs=h("div",{style:{color:"#38bdf8",fontFamily:"monospace",fontSize:"9px",letterSpacing:"2px"}});hs.textContent="LAVORI DA COMPLETARE";
  const ht=h("div",{style:{color:"#f8fafc",fontSize:"16px",fontWeight:"800"}});ht.textContent="Lista Lavori Pendenti";
  hl.append(hs,ht);
  const cl=h("button",{style:{background:"none",border:"none",color:"#475569",fontSize:"20px"},onClick:()=>setState({showLavori:false})});cl.textContent="✕";
  hdr.append(hl,cl);box.appendChild(hdr);

  // Filter tabs: Tutti / Officina / Ufficio + solo NON OK / tutti i pendenti
  let filterSec="tutti", filterStatus="active";
  const tabsRow=h("div",{style:{display:"flex",gap:"6px",flexWrap:"wrap"}});

  function rebuild() {
    tabsRow.innerHTML="";
    // Section filter
    [{id:"tutti",l:"Tutti"},{id:"lavorazioni",l:"🔧 Officina"},{id:"ufficio",l:"📋 Ufficio"}].forEach(({id,l})=>{
      const tb=h("button",{style:{background:filterSec===id?"#38bdf822":"#0a0f1a",border:"1px solid "+(filterSec===id?"#38bdf8":"#1e2d3d"),borderRadius:"7px",padding:"5px 12px",color:filterSec===id?"#38bdf8":"#475569",fontWeight:filterSec===id?"700":"400",fontSize:"11px"},onClick:()=>{filterSec=id;rebuild();}});
      tb.textContent=l;tabsRow.appendChild(tb);
    });
    // Spacer
    const sp=h("div",{style:{flex:"1"}});tabsRow.appendChild(sp);
    // Status filter
    [{id:"active",l:"❌⚠️ Da fare"},{id:"all",l:"Tutti i pendenti"}].forEach(({id,l})=>{
      const tb=h("button",{style:{background:filterStatus===id?"#1e2533":"#0a0f1a",border:"1px solid "+(filterStatus===id?"#475569":"#1e2d3d"),borderRadius:"7px",padding:"5px 12px",color:filterStatus===id?"#f8fafc":"#475569",fontWeight:filterStatus===id?"700":"400",fontSize:"11px"},onClick:()=>{filterStatus=id;rebuild();}});
      tb.textContent=l;tabsRow.appendChild(tb);
    });

    // Build grouped list
    listWrap.innerHTML="";

    // Group: { sectionId -> { veicolo -> [items] } }
    const groups = {};
    SECTIONS.forEach(s=>{
      if(filterSec!=="tutti" && s.id!==filterSec) return;
      state.veicoli.forEach(v=>{
        const items=(v.checklist[s.id]||[]).filter(i=>{
          if(filterStatus==="active") return i.status==="nook"||i.status==="controllare";
          return i.status!=="ok"&&i.status!=="non_presente";
        });
        if(items.length===0) return;
        if(!groups[s.id]) groups[s.id]={section:s,veicoli:{}};
        groups[s.id].veicoli[v.id]={veicolo:v,items};
      });
    });

    if(Object.keys(groups).length===0) {
      const em=h("div",{style:{textAlign:"center",padding:"40px 0",color:"#475569"}});
      em.textContent=filterStatus==="active"?"🎉 Nessun lavoro urgente in sospeso!":"Nessun lavoro pendente!";
      listWrap.appendChild(em);return;
    }

    Object.values(groups).forEach(({section,veicoli:vMap})=>{
      // Section header
      const sHdr=h("div",{style:{background:section.color+"18",border:"1px solid "+section.color+"33",borderRadius:"10px",padding:"9px 14px",marginBottom:"8px",display:"flex",alignItems:"center",gap:"8px"}});
      const sIco=h("span",{style:{fontSize:"15px"}});sIco.textContent=section.icon;
      const sLbl=h("span",{style:{color:section.color,fontWeight:"800",fontSize:"14px"}});sLbl.textContent=section.label;
      const sCnt=h("span",{style:{color:section.color,opacity:".6",fontSize:"11px",fontFamily:"monospace",marginLeft:"auto"}});
      const tot=Object.values(vMap).reduce((a,{items})=>a+items.length,0);
      sCnt.textContent=tot+" lavori";
      sHdr.append(sIco,sLbl,sCnt);listWrap.appendChild(sHdr);

      // Per vehicle
      Object.values(vMap).forEach(({veicolo:v,items})=>{
        const vHdr=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"6px 4px",marginBottom:"4px",cursor:"pointer"},onClick:()=>{setState({showLavori:false,sel:v,view:"dettaglio"});}});
        const vtg=h("span",{style:{color:"#F59E0B",fontFamily:"monospace",fontWeight:"900",fontSize:"14px"}});vtg.textContent=v.targa;
        const vnm=h("span",{style:{color:"#94a3b8",fontSize:"12px"}});vnm.textContent=v.veicolo;
        const varr=h("span",{style:{color:"#334155",fontSize:"11px",marginLeft:"auto"}});varr.textContent="→ apri scheda";
        vHdr.append(vtg,vnm,varr);listWrap.appendChild(vHdr);

        // Items
        const itemsList=h("div",{style:{marginBottom:"12px",paddingLeft:"8px",borderLeft:"2px solid #1e2d3d"}});
        items.forEach(item=>{
          const sc=SCOLORS[item.status];
          const row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",padding:"7px 10px",marginBottom:"3px",background:"#0a0f1a",borderRadius:"7px",cursor:"pointer"},
            onClick:async()=>{
              // Quick status toggle
              const cl=JSON.parse(JSON.stringify(v.checklist));
              const cycle=NP_ITEMS.includes(item.label)?SCYCLE:SCYCLE_NNP;
              Object.keys(cl).forEach(sId=>{cl[sId]=cl[sId].map(it=>it.label===item.label?{...it,status:cycle[it.status],by:state.op,at:nowTs()}:it);});
              const upd={...v,checklist:cl,log:[...(v.log||[]),{op:state.op,a:SLABELS[cycle[item.status]]+": "+item.label,t:nowTs()}]};
              await save(state.veicoli.map(x=>x.id===upd.id?upd:x));
              rebuild();
            }
          });
          const dot=h("span",{class:"badge",style:{background:sc.bg,color:sc.text,borderColor:sc.border,fontSize:"9px",padding:"2px 6px",flexShrink:"0"}});dot.textContent=SLABELS[item.status];
          const lbl=h("span",{style:{color:"#f8fafc",fontSize:"12px",flex:"1"}});lbl.textContent=item.label;
          if(item.note){const nt=h("span",{style:{color:"#fbbf24",fontSize:"10px",fontStyle:"italic",maxWidth:"120px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}});nt.textContent="\""+item.note+"\"";row.append(dot,lbl,nt);}
          else row.append(dot,lbl);
          const hint=h("span",{style:{color:"#334155",fontSize:"9px",flexShrink:"0"}});hint.textContent="tocca→avanza";
          row.appendChild(hint);
          itemsList.appendChild(row);
        });
        listWrap.appendChild(itemsList);
      });
    });
  }

  const listWrap=h("div",{style:{overflowY:"auto",flex:"1"}});
  rebuild();
  const foot=h("div",{style:{color:"#475569",fontSize:"10px",textAlign:"center"}});foot.textContent="Tocca una voce per avanzare il suo stato · Tocca la targa per aprire la scheda";
  box.append(tabsRow,listWrap,foot);bg.appendChild(box);return bg;
}

  const save3=h("button",{style:{background:"#F59E0B",color:"#000",border:"none",borderRadius:"7px",padding:"8px 20px",fontWeight:"700"},onClick:()=>{

    const upd={...vv,scadenza:sc,alertDays:ad,log:[...(vv.log||[]),{op:state.op,a:"Scadenza → "+isoToIt(sc)+" (alert "+ad+"gg)",t:nowTs()}]};
    const veicoli=state.veicoli.map(x=>x.id===upd.id?upd:x);
    save(veicoli);setState({showScadModal:null,sel:upd,veicoli});
  }});save3.textContent="Salva";
  btns.append(cancel,save3);

}

// ── ASSISTENTE VOCALE ─────────────────────────────────────────────────────────
let recognition = null;
let synth = window.speechSynthesis;
let voiceActive = false;

function speak(text) {
  synth.cancel();
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = "it-IT";
  utt.rate = 1.05;
  utt.pitch = 1;
  // Try to find Italian voice
  const voices = synth.getVoices();
  const itVoice = voices.find(v => v.lang.startsWith("it"));
  if(itVoice) utt.voice = itVoice;
  synth.speak(utt);
  return new Promise(res => { utt.onend = res; utt.onerror = res; });
}

function normalizeStr(s) {
  return (s||"").toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9 ]/g," ").trim();
}

function findVeicolo(transcript) {
  const t = normalizeStr(transcript);
  // Try exact targa match (sequence of letters+numbers)
  const targaMatch = transcript.match(/\b([A-Z]{2}\s?\d{3}\s?[A-Z]{2}|[A-Z]{2}\d{3}[A-Z]{2})\b/i);
  if(targaMatch) {
    const targa = targaMatch[0].replace(/\s/g,"").toUpperCase();
    const v = state.veicoli.find(v => v.targa.replace(/\s/g,"").toUpperCase() === targa);
    if(v) return v;
  }
  // Try vehicle name match
  return state.veicoli.find(v => {
    const vn = normalizeStr(v.veicolo);
    const vt = normalizeStr(v.targa);
    return t.includes(vn) || t.includes(vt) || vn.split(" ").some(w => w.length>3 && t.includes(w));
  });
}

function findChecklistItem(transcript, v) {
  const t = normalizeStr(transcript);
  let bestMatch = null, bestScore = 0;
  Object.values(v.checklist).forEach(items => items.forEach(item => {
    const label = normalizeStr(item.label);
    const words = label.split(" ").filter(w => w.length > 3);
    const matches = words.filter(w => t.includes(w)).length;
    const score = matches / Math.max(words.length, 1);
    if(score > bestScore && score > 0.4) { bestScore = score; bestMatch = item; }
  }));
  return bestMatch;
}

function getVeicoloStatus(v) {
  const c = getCounts(v.checklist);
  const pct = calcPct(v.checklist);
  const pos = POSIZIONI.find(p => p.id === v.posizione)||POSIZIONI[0];
  let msg = `${v.veicolo}, targa ${v.targa.split("").join(" ")}: preparazione al ${pct}%. `;
  msg += `Posizione: ${pos.label}. `;
  if(c.ok > 0) msg += `${c.ok} voci OK. `;
  if(c.nook > 0) msg += `${c.nook} voci non OK. `;
  if(c.controllare > 0) msg += `${c.controllare} da controllare. `;
  if(c.pending > 0) msg += `${c.pending} ancora da verificare. `;
  if(pct === 100) msg += "Veicolo pronto!";
  return msg;
}

function parseCommand(transcript) {
  const t = normalizeStr(transcript);

  // QUERY STATUS
  const queryWords = ["stato","come","siamo","pronti","pronto","preparazione","aggiornamento","info","dimmi","situazione","quante","quanto"];
  const isQuery = queryWords.some(w => t.includes(w));

  // STATUS CHANGE words
  const okWords = ["fatto","ok","okay","completato","eseguito","verificato","confermato","bene","passato","superato"];
  const nookWords = ["non ok","problema","rotto","da fare","da riparare","da sostituire","negativo","fallito","non passa","ko"];
  const contrWords = ["controllare","controllato","da controllare","verifica","verificare","attenzione","dubbio"];
  const npWords = ["non presente","non esiste","mancante","assente","non installato","non ha"];

  const isOk = okWords.some(w => t.includes(w));
  const isNook = nookWords.some(w => t.includes(w));
  const isContr = contrWords.some(w => t.includes(w));
  const isNP = npWords.some(w => t.includes(w));

  // NOTE words
  const noteWords = ["nota","appunto","annota","scrivi","segna","commento"];
  const isNote = noteWords.some(w => t.includes(w));

  const v = findVeicolo(transcript);

  if(!v && state.veicoli.length === 0) {
    return { action:"speak", text:"Non ci sono veicoli in lista al momento." };
  }

  if(!v && state.veicoli.length === 1) {
    // Single vehicle - use it implicitly
    return processWithVeicolo(state.veicoli[0], transcript, t, isQuery, isOk, isNook, isContr, isNP, isNote);
  }

  if(!v) {
    if(isQuery && !transcript.match(/\b[A-Z]{2}/)) {
      // General query about all vehicles
      const c = state.veicoli.length;
      const pronti = state.veicoli.filter(v => calcPct(v.checklist)===100).length;
      const nookTot = state.veicoli.reduce((a,v)=>a+getCounts(v.checklist).nook,0);
      let msg = `Hai ${c} veicoli in lista. ${pronti} pronti. `;
      if(nookTot > 0) msg += `${nookTot} voci non OK totali. `;
      const names = state.veicoli.map(v=>`${v.veicolo} al ${calcPct(v.checklist)}%`).join(", ");
      msg += names + ".";
      return { action:"speak", text:msg };
    }
    return { action:"speak", text:"Non ho trovato nessun veicolo. Prova a dire la targa o il nome del veicolo." };
  }

  return processWithVeicolo(v, transcript, t, isQuery, isOk, isNook, isContr, isNP, isNote);
}

function processWithVeicolo(v, transcript, t, isQuery, isOk, isNook, isContr, isNP, isNote) {
  if(isQuery && !isOk && !isNook && !isContr && !isNote) {
    return { action:"speak", text:getVeicoloStatus(v) };
  }

  // Find checklist item
  const item = findChecklistItem(transcript, v);

  if(isNote && item) {
    // Extract note text after "nota" keyword
    const noteMatch = transcript.match(/(?:nota|appunto|annota|scrivi|segna|commento)[:\s]+(.+)/i);
    const noteText = noteMatch ? noteMatch[1].trim() : transcript;
    return { action:"note", veicolo:v, item, note:noteText, text:`Ho aggiunto la nota "${noteText}" a ${item.label} del ${v.veicolo}.` };
  }

  if(item) {
    let newStatus = null, statusName = "";
    if(isNP) { newStatus="non_presente"; statusName="Non Presente"; }
    else if(isNook) { newStatus="nook"; statusName="Non OK"; }
    else if(isContr) { newStatus="controllare"; statusName="Da Controllare"; }
    else if(isOk) { newStatus="ok"; statusName="OK"; }

    if(newStatus) {
      return { action:"status", veicolo:v, item, newStatus, text:`Ho segnato ${item.label} come ${statusName} per il ${v.veicolo}.` };
    }
    // Just info about that item
    return { action:"speak", text:`${item.label} del ${v.veicolo} è attualmente ${SLABELS[item.status]}.` };
  }

  // Generic vehicle info
  return { action:"speak", text:getVeicoloStatus(v) };
}

function applyCommand(cmd) {
  if(cmd.action === "speak") return;

  if(cmd.action === "status") {
    const v = cmd.veicolo;
    const cl = JSON.parse(JSON.stringify(v.checklist));
    Object.keys(cl).forEach(sId => {
      cl[sId] = cl[sId].map(it =>
        it.label === cmd.item.label ? {...it, status:cmd.newStatus, by:state.op+" (voce)", at:nowTs()} : it
      );
    });
    const upd = {...v, checklist:cl, log:[...(v.log||[]), {op:state.op, a:"[🎤] "+SLABELS[cmd.newStatus]+": "+cmd.item.label, t:nowTs()}]};
    const veicoli = state.veicoli.map(x => x.id===upd.id?upd:x);
    save(veicoli);
  }

  if(cmd.action === "note") {
    const v = cmd.veicolo;
    const cl = JSON.parse(JSON.stringify(v.checklist));
    Object.keys(cl).forEach(sId => {
      cl[sId] = cl[sId].map(it =>
        it.label === cmd.item.label ? {...it, note:cmd.note, by:state.op+" (voce)", at:nowTs()} : it
      );
    });
    const upd = {...v, checklist:cl, log:[...(v.log||[]), {op:state.op, a:"[🎤] Nota: "+cmd.item.label, t:nowTs()}]};
    const veicoli = state.veicoli.map(x => x.id===upd.id?upd:x);
    save(veicoli);
  }
}

function startVoice() {
  if(!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    speak("Il riconoscimento vocale non è supportato su questo browser. Prova Chrome.");
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  recognition = new SR();
  recognition.lang = "it-IT";
  recognition.continuous = false;
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  voiceActive = true;
  setState({voiceState:"listening"});

  recognition.onresult = async e => {
    const transcript = e.results[0][0].transcript;
    setState({voiceState:"thinking", voiceTranscript:transcript});
    const cmd = parseCommand(transcript);
    applyCommand(cmd);
    await speak(cmd.text);
    setState({voiceState:null, voiceTranscript:null});
    voiceActive = false;
  };
  recognition.onerror = e => {
    voiceActive = false;
    let msg = "Non ho capito. Riprova.";
    if(e.error === "no-speech") msg = "Non ho sentito nulla. Prova a parlare più vicino al microfono.";
    if(e.error === "not-allowed") msg = "Microfono non autorizzato. Controlla i permessi.";
    speak(msg);
    setState({voiceState:null, voiceTranscript:null});
  };
  recognition.onend = () => {
    if(voiceActive) { voiceActive=false; setState({voiceState:null, voiceTranscript:null}); }
  };

  speak("Dimmi.").then(() => {
    try { recognition.start(); } catch(e) {}
  });
}

function stopVoice() {
  if(recognition) { recognition.stop(); recognition = null; }
  synth.cancel();
  voiceActive = false;
  setState({voiceState:null, voiceTranscript:null});
}
