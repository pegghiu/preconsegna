  <script>
    // Load scripts sequentially to avoid timing issues
    function loadScript(src) {
      return new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = src;
        s.onload = resolve;
        s.onerror = reject;
        document.head.appendChild(s);
      });
    }

    async function init() {
      try {
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js');
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js');
        await loadScript('https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js');
        
        // Now transform and run our app
        const appCode = document.getElementById('app-source').textContent;
        const transformed = Babel.transform(appCode, {
          presets: ['react', 'env'],
          filename: 'app.jsx'
        }).code;
        
        const fn = new Function('React', 'ReactDOM', transformed);
        fn(React, ReactDOM);
        
        document.getElementById('loading').style.display = 'none';
      } catch(e) {
        document.getElementById('loading').innerHTML = 
          '<div style="color:#f87171;text-align:center;padding:20px">Errore caricamento: ' + e.message + '<br><br><button onclick="location.reload()" style="background:#F59E0B;color:#000;border:none;padding:10px 20px;border-radius:8px;cursor:pointer;font-weight:700">Riprova</button></div>';
      }
    }

    init();
  </script>

const SB_HDR = {
  "apikey": SB_KEY,
  "Authorization": "Bearer " + SB_KEY,
  "Content-Type": "application/json",
  "Prefer": "return=minimal"
};

async function dbRead() {
  const r = await fetch(SB_URL + "/rest/v1/veicoli?id=eq.1&select=data", { headers: SB_HDR });
  if (!r.ok) { const t=await r.text(); throw new Error("SB " + r.status + ": " + t.slice(0,100)); }
  const rows = await r.json();
  if (!rows || rows.length === 0) return { veicoli: [] };
  return rows[0].data || { veicoli: [] };
}

async function dbWrite(data) {
  const r = await fetch(SB_URL + "/rest/v1/veicoli?id=eq.1", {
    method: "PATCH",
    headers: SB_HDR,
    body: JSON.stringify({ data, updated_at: new Date().toISOString() })
  });
  if (!r.ok) { const t=await r.text(); throw new Error("SB " + r.status + ": " + t.slice(0,100)); }
}

async function dbReadVeicoli() { const db=await dbRead(); return db.veicoli||[]; }
async function dbWriteVeicoli(list) { const db=await dbRead(); await dbWrite({...db, veicoli:list}); }
async function dbReadArchivio() { const db=await dbRead(); return db.archivio||[]; }
async function dbArchiviaVeicolo(v) {
  const db=await dbRead();
  const archivio=[...(db.archivio||[]), {...v, archiviatoIl: new Date().toLocaleString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric",hour:"2-digit",minute:"2-digit"})}];
  const veicoli=(db.veicoli||[]).filter(x=>x.id!==v.id);
  await dbWrite({...db, veicoli, archivio});
  return {veicoli, archivio};
}

const S_CYCLE = { pending:"ok", ok:"nook", nook:"controllare", controllare:"non_presente", non_presente:"pending" };
const S_CYCLE_NO_NP = { pending:"ok", ok:"nook", nook:"controllare", controllare:"pending" };
const S_LABEL = { pending:"—", ok:"OK", nook:"NON OK", controllare:"CONTROLLARE", non_presente:"NON PRESENTE" };
const S_COLOR = {
  pending:      { bg:"#1e2533", text:"#64748b", border:"#334155" },
  ok:           { bg:"#052e16", text:"#4ade80", border:"#166534" },
  nook:         { bg:"#2d1515", text:"#f87171", border:"#7f1d1d" },
  controllare:  { bg:"#2d2000", text:"#fbbf24", border:"#92400e" },
  non_presente: { bg:"#1a1a2e", text:"#a78bfa", border:"#4c1d95" },
};
const ALERT_OPTS = [1,2,3,5,7,10,14];
const NP_ITEMS = ['SENSORI PARCHEGGIO', 'RUOTA SCORTA/CRIC/CHIAVI/GANCIO', 'FISSAGGIO RUOTA DI SCORTA', 'KIT GONFIAGGIO/GANCIO', 'ADBLUE', 'GANCIO TRAINO', 'TEST RIBALTABILE', 'REVISIONE BOMBOLE METANO/GPL'];
const OP_COLS = ["#F59E0B","#3B82F6","#10B981","#8B5CF6","#f87171","#38bdf8","#fb923c","#a78bfa"];

const opCol = n => { let h=0; for(const c of n) h=c.charCodeAt(0)+((h<<5)-h); return OP_COLS[Math.abs(h)%OP_COLS.length]; };
const nowTs = () => new Date().toLocaleString("it-IT",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
const isoToIt = s => s ? new Date(s).toLocaleDateString("it-IT",{day:"2-digit",month:"2-digit",year:"numeric"}) : "";
const getDays = s => { if(!s)return null; const t=new Date(s); t.setHours(0,0,0,0); const n=new Date(); n.setHours(0,0,0,0); return Math.round((t-n)/86400000); };
const getAlertLv = (d,a) => d===null?null:d<0?"scaduto":d===0?"oggi":d<=(a||3)?"warning":"ok";

const buildCL = () => {
  const r={};
  SECTIONS.forEach(s=>{ r[s.id]=s.items.map(label=>({label,status:"pending",note:"",by:null,at:null})); });
  return r;
};
const buildExtra = () => ({ pre1:"", pre2:"", post1:"", post2:"" });
const calcPct = cl => { let t=0,d=0; Object.values(cl).forEach(a=>a.forEach(i=>{t++;if(i.status!=="pending")d++;})); return t?Math.round(d/t*100):0; };
const secPct = items => items?.length ? Math.round(items.filter(i=>i.status!=="pending").length/items.length*100) : 0;
const getCounts = cl => { const r={ok:0,nook:0,controllare:0,non_presente:0,pending:0}; Object.values(cl).forEach(a=>a.forEach(i=>r[i.status]++)); return r; };

const Av = ({name,size=26}) => { const c=opCol(name),ini=name.split(" ").map(w=>w[0]).slice(0,2).join("").toUpperCase(); return <div style={{width:size,height:size,borderRadius:"50%",background:c+"33",border:`2px solid ${c}`,display:"flex",alignItems:"center",justifyContent:"center",color:c,fontSize:size*.38,fontWeight:800,fontFamily:"monospace",flexShrink:0}}>{ini}</div>; };

const Ring = ({pct,size=54,stroke=5,color="#F59E0B"}) => { const r=(size-stroke)/2,ci=2*Math.PI*r; return <svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#1e2533" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={`${pct/100*ci} ${ci}`} style={{transition:"stroke-dasharray .4s"}}/></svg>; };

const SBtn = ({status,onChange}) => { const s=S_COLOR[status]; return <button onClick={onChange} style={{background:s.bg,color:s.text,border:`1px solid ${s.border}`,borderRadius:6,padding:"3px 8px",fontSize:11,fontWeight:700,fontFamily:"monospace",cursor:"pointer",minWidth:90,whiteSpace:"nowrap"}}>{S_LABEL[status]}</button>; };

const PosBadge = ({pos,lg}) => { const p=POSIZIONI.find(x=>x.id===pos)||POSIZIONI[0]; return <div style={{background:p.color+"22",border:`1.5px solid ${p.color}66`,borderRadius:8,padding:lg?"7px 15px":"3px 8px",display:"inline-flex",alignItems:"center",gap:5}}><span style={{fontSize:lg?14:11}}>{p.icon}</span><span style={{color:p.color,fontWeight:700,fontSize:lg?14:11,whiteSpace:"nowrap"}}>{p.label}</span></div>; };

const ScadBadge = ({scad,ad,compact}) => {
  if(!scad)return null;
  const d=getDays(scad),lv=getAlertLv(d,ad);
  const cfg={scaduto:{bg:"#2d0a0a",border:"#7f1d1d",text:"#f87171",l:"🚨 SCADUTO"},oggi:{bg:"#2d1515",border:"#b91c1c",text:"#fca5a5",l:"🔴 OGGI"},warning:{bg:"#2d2000",border:"#92400e",text:"#fbbf24",l:`⏰ ${d}gg`},ok:{bg:"#0a1a0a",border:"#166534",text:"#4ade80",l:`📅 ${d}gg`}};
  if(!cfg[lv])return null; const c=cfg[lv];
  return <div style={{background:c.bg,border:`1px solid ${c.border}`,borderRadius:6,padding:compact?"2px 6px":"4px 10px",display:"inline-flex",alignItems:"center"}}><span style={{color:c.text,fontSize:compact?10:12,fontWeight:700,fontFamily:"monospace"}}>{compact?c.l:`${c.l} · ${isoToIt(scad)}`}</span></div>;
};

// CARD
function Card({v,onOpen,onDelete,onArchivia}) {
  const pct=calcPct(v.checklist),rc=pct===100?"#4ade80":pct>60?"#F59E0B":"#f87171";
  const cnt=getCounts(v.checklist),last=v.log?.[v.log.length-1];
  const urgent=["scaduto","oggi","warning"].includes(getAlertLv(getDays(v.scadenza),v.alertDays));
  return <div onClick={onOpen} style={{background:"#0f1621",border:`1px solid ${urgent?"#7f1d1d":"#1e2d3d"}`,borderRadius:13,padding:16,cursor:"pointer",position:"relative",transition:"transform .15s,border-color .2s"}} onMouseEnter={e=>{e.currentTarget.style.transform="translateY(-2px)";e.currentTarget.style.borderColor=urgent?"#f87171":"#F59E0B"}} onMouseLeave={e=>{e.currentTarget.style.transform="translateY(0)";e.currentTarget.style.borderColor=urgent?"#7f1d1d":"#1e2d3d"}}>
    <button onClick={e=>{e.stopPropagation();onDelete()}} style={{position:"absolute",top:9,right:9,background:"none",border:"none",color:"#334155",cursor:"pointer",fontSize:14}}>✕</button>
    {v.posizione==="venduto"&&<button onClick={e=>{e.stopPropagation();onArchivia&&onArchivia();}} style={{position:"absolute",top:9,right:30,background:"#8B5CF622",border:"1px solid #8B5CF655",borderRadius:5,color:"#a78bfa",cursor:"pointer",fontSize:9,padding:"2px 5px",fontWeight:700,whiteSpace:"nowrap"}}>📦 ARCHIVIA</button>}

    <div style={{display:"flex",alignItems:"center",gap:11}}>
      <div style={{position:"relative",flexShrink:0}}><Ring pct={pct} color={rc}/><span style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",color:rc,fontSize:11,fontWeight:700,fontFamily:"monospace"}}>{pct}%</span></div>
      <div style={{flex:1,minWidth:0}}>

      </div>
    </div>
    <div style={{marginTop:11,display:"flex",gap:5}}>
      {SECTIONS.map(s=>{const p=secPct(v.checklist[s.id]);return <div key={s.id} style={{flex:1}}><div style={{height:3,background:"#1e2533",borderRadius:4,overflow:"hidden"}}><div style={{height:"100%",width:`${p}%`,background:s.color,borderRadius:4}}/></div><div style={{color:"#475569",fontSize:9,marginTop:2,textAlign:"center"}}>{s.icon}</div></div>;})}
    </div>
    <div style={{marginTop:8,display:"flex",gap:4,flexWrap:"wrap"}}>
      {cnt.nook>0&&<span style={{background:S_COLOR.nook.bg,color:S_COLOR.nook.text,border:`1px solid ${S_COLOR.nook.border}`,borderRadius:4,padding:"1px 6px",fontSize:9,fontFamily:"monospace"}}>NON OK: {cnt.nook}</span>}
      {cnt.controllare>0&&<span style={{background:S_COLOR.controllare.bg,color:S_COLOR.controllare.text,border:`1px solid ${S_COLOR.controllare.border}`,borderRadius:4,padding:"1px 6px",fontSize:9,fontFamily:"monospace"}}>CONTROLLARE: {cnt.controllare}</span>}
      {cnt.ok>0&&<span style={{background:S_COLOR.ok.bg,color:S_COLOR.ok.text,border:`1px solid ${S_COLOR.ok.border}`,borderRadius:4,padding:"1px 6px",fontSize:9,fontFamily:"monospace"}}>OK: {cnt.ok}</span>}
    </div>
    {(()=>{
      const daFare=[];
      Object.values(v.checklist).forEach(items=>items.forEach(i=>{
        if(i.status==="nook"||i.status==="controllare") daFare.push(i);
      }));
      const nonVerif=Object.values(v.checklist).reduce((a,items)=>a+items.filter(i=>i.status==="pending").length,0);
      if(daFare.length===0&&nonVerif===0) return null;
      return <div style={{marginTop:10,borderTop:"1px solid #1e2533",paddingTop:10}}>
        {daFare.length>0&&<div style={{marginBottom:5}}>
          <div style={{color:"#64748b",fontSize:9,fontFamily:"monospace",letterSpacing:1,marginBottom:4}}>DA FARE ({daFare.length})</div>
          {daFare.slice(0,5).map((i,idx)=><div key={idx} style={{display:"flex",alignItems:"center",gap:5,marginBottom:2}}>
            <span style={{width:5,height:5,borderRadius:"50%",background:i.status==="nook"?"#f87171":"#fbbf24",flexShrink:0,display:"inline-block"}}/>
            <span style={{color:i.status==="nook"?"#f87171":"#fbbf24",fontSize:10,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{i.label}</span>
          </div>)}
          {daFare.length>5&&<div style={{color:"#475569",fontSize:10,paddingLeft:10}}>+{daFare.length-5} altri...</div>}
        </div>}
        {nonVerif>0&&<div style={{color:"#334155",fontSize:10}}>⬜ {nonVerif} voci non ancora verificate</div>}
      </div>;
    })()}
    {last&&<div style={{marginTop:8,display:"flex",alignItems:"center",gap:6,borderTop:"1px solid #1e2533",paddingTop:7}}><Av name={last.op} size={16}/><span style={{color:"#475569",fontSize:10}}><span style={{color:opCol(last.op),fontWeight:600}}>{last.op}</span> · {last.msg} · {last.t}</span></div>}
  </div>;
}

// DETTAGLIO
function Detail({v,onBack,onUpdate,op}) {
  const [sec,setSec]=useState("lavorazioni");

  const [noteText,setNoteText]=useState("");
  const [showLog,setShowLog]=useState(false);

  const [editNota,setEditNota]=useState(false);

    const cl={...v.checklist}; cl[sId]=cl[sId].map((it,i)=>i===idx?{...it,status:st,by:op,at:nowTs()}:it);

    {/* ANNOTAZIONI */}

      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:9}}>

  return <div style={{background:"#1a0a00",border:"1px solid #92400e",borderRadius:9,padding:"8px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:9,flexWrap:"wrap"}}>
    <span>⏰</span><span style={{color:"#fbbf24",fontWeight:700,fontSize:12}}>SCADENZE IN ARRIVO</span>
    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
      {urgenti.map(v=>{
        const lv=getAlertLv(getDays(v.scadenza),v.alertDays),tc=lv==="scaduto"||lv==="oggi"?"#f87171":"#fbbf24";
        return <button key={v.id} onClick={()=>onOpen(v)} style={{background:"#2d1500",border:`1px solid ${tc}55`,borderRadius:6,padding:"2px 9px",cursor:"pointer",color:tc,fontSize:11,fontWeight:700,display:"flex",alignItems:"center",gap:4}}>

      })}

  </div>;
}

// APP
function App() {
  const [op,setOp]=useState(null);
  const [veicoli,setVeicoli]=useState([]);
  const [view,setView]=useState("lista");
  const [sel,setSel]=useState(null);
  const [loaded,setLoaded]=useState(false);
  const [sync,setSync]=useState(null);
  const [fp,setFp]=useState("tutti");
  const [showExport,setShowExport]=useState(false);
  const [showArchivio,setShowArchivio]=useState(false);
  const [archivio,setArchivio]=useState([]);
  const pol=useRef(null);

  const [loadError,setLoadError]=useState(null);
  const [syncing,setSyncing]=useState(false);

  // One-time migration from window.storage to Supabase
  const migrate = useCallback(async()=>{
    const OLD_KEYS = ["preconsegna-master","preconsegna-v1","preconsegna-v2","preconsegna-v3","preconsegna-v4","veicoli-checklist","veicoli-checklist-v2","mezzi-v3","preconsegna-db-veicoli-v1"];
    let best = [];
    for(const key of OLD_KEYS){
      try{
        const r = await window.storage.get(key, true);
        if(!r?.value) continue;
        const d = JSON.parse(r.value);
        const arr = Array.isArray(d) ? d : (d.veicoli || []);
        if(arr.length > best.length) best = arr;
      }catch{}
    }
    if(best.length > 0){
      try{ await dbWriteVeicoli(best); }catch{}
    }
  },[]);

  const load=useCallback(async(manual=false)=>{
    if(manual) setSyncing(true);
    try{
      const db=await dbRead();
      setVeicoli(db.veicoli||[]);
      setArchivio(db.archivio||[]);
      setLoadError(null);
    }catch(e){
      setLoadError(e?.message||'Errore sconosciuto');
    }
    setSync(new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
    if(manual) setSyncing(false);
  },[]);

  const save=useCallback(async list=>{
    setVeicoli(list);
    try{await dbWriteVeicoli(list);}catch{}
    setSync(new Date().toLocaleTimeString("it-IT",{hour:"2-digit",minute:"2-digit",second:"2-digit"}));
  },[]);

  useEffect(()=>{ migrate().then(()=>load()).then(()=>setLoaded(true)); },[]);
  useEffect(()=>{pol.current=setInterval(load,8000);return()=>clearInterval(pol.current);},[load]);

  const addV=v=>{save([...veicoli,v]);setSel(v);setView("dettaglio");};
  const [confirmArchivia,setConfirmArchivia]=useState(null);
  const archiviaV=async v=>{
    setConfirmArchivia(v);
  };
  const doArchivia=async v=>{
    setConfirmArchivia(null);
    try{
      const {veicoli:nv,archivio:na}=await dbArchiviaVeicolo(v);
      setVeicoli(nv); setArchivio(na);
      if(sel&&sel.id===v.id) setView("lista");
    }catch(e){alert("Errore archiviazione: "+e.message);}
  };
  const updV=v=>{save(veicoli.map(x=>x.id===v.id?v:x));setSel(v);};
  const delV=id=>save(veicoli.filter(v=>v.id!==id));
  const openV=v=>{setSel(v);setView("dettaglio");};

  if(!op) return <Login onLogin={setOp}/>;
  if(!loaded) return <div style={{background:"#070c14",minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:14,color:"#F59E0B",fontFamily:"monospace"}}>
    <div style={{fontSize:36}}>🚗</div><div>Caricamento veicoli...</div>
  </div>;

  const totOk=veicoli.filter(v=>calcPct(v.checklist)===100).length;
  const totNook=veicoli.reduce((a,v)=>a+getCounts(v.checklist).nook,0);
  const cur=sel?veicoli.find(v=>v.id===sel.id)||sel:null;
  const filtered=fp==="tutti"?veicoli:veicoli.filter(v=>v.posizione===fp);

  return <div style={{background:"#070c14",minHeight:"100vh",color:"#f8fafc",fontFamily:"'Segoe UI',system-ui,sans-serif"}}>
    {/* TOP BAR */}
    <div style={{background:"#0a0f1a",borderBottom:"1px solid #1e2d3d",padding:"10px 18px",display:"flex",alignItems:"center",gap:11,flexWrap:"wrap"}}>
      <span style={{fontSize:17}}>🚗</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{color:"#F59E0B",fontFamily:"monospace",fontSize:9,letterSpacing:3}}>PRECONSEGNA</div>
        <div style={{color:"#f8fafc",fontSize:14,fontWeight:800}}>Controllo Mezzi in Vendita</div>
      </div>
      <div style={{display:"flex",alignItems:"center",gap:4,background:"#0f1621",border:"1px solid #1e2d3d",borderRadius:7,padding:"3px 8px",cursor:"pointer"}} onClick={()=>load(true)}>
        <span style={{width:6,height:6,borderRadius:"50%",background:syncing?"#F59E0B":loadError?"#f87171":"#4ade80",display:"inline-block",boxShadow:`0 0 5px ${syncing?"#F59E0B":loadError?"#f87171":"#4ade80"}`}}/>
        <span style={{color:loadError?"#f87171":"#475569",fontSize:9,fontFamily:"monospace"}}>{syncing?"Aggiorno...":loadError?"⚠ Riprova":`↺ ${sync||"..."}`}</span>
      </div>
      {veicoli.length>0&&<>
        <div style={{textAlign:"center"}}><div style={{color:"#F59E0B",fontFamily:"monospace",fontSize:14,fontWeight:800}}>{veicoli.length}</div><div style={{color:"#475569",fontSize:9}}>Veicoli</div></div>
        <div style={{textAlign:"center"}}><div style={{color:"#4ade80",fontFamily:"monospace",fontSize:14,fontWeight:800}}>{totOk}</div><div style={{color:"#475569",fontSize:9}}>Completati</div></div>
        {totNook>0&&<div style={{textAlign:"center"}}><div style={{color:"#f87171",fontFamily:"monospace",fontSize:14,fontWeight:800}}>{totNook}</div><div style={{color:"#475569",fontSize:9}}>Non OK</div></div>}
      </>}
      <div style={{display:"flex",alignItems:"center",gap:6,background:"#0f1621",border:`1px solid ${opCol(op)}44`,borderRadius:8,padding:"5px 10px"}}>
        <Av name={op} size={19}/><span style={{color:opCol(op),fontWeight:700,fontSize:11}}>{op}</span>
        <button onClick={()=>setOp(null)} style={{background:"none",border:"none",color:"#334155",cursor:"pointer",fontSize:10,padding:0,marginLeft:2}}>✕</button>
      </div>
      {view!=="nuovo"&&<button onClick={()=>setView("nuovo")} style={{background:"#F59E0B",color:"#000",border:"none",borderRadius:8,padding:"8px 14px",fontWeight:800,cursor:"pointer",fontSize:12}}>+ Nuovo</button>}
      <button onClick={()=>setShowArchivio(true)} title="Archivio veicoli venduti"
        style={{background:"#1e2533",color:"#a78bfa",border:"1px solid #4c1d95",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:14}}>📦</button>
      <button onClick={()=>setShowExport(true)} title="Visualizza database veicoli"
        style={{background:"#1e2533",color:"#94a3b8",border:"1px solid #334155",borderRadius:8,padding:"8px 12px",cursor:"pointer",fontSize:14}}>💾</button>
    </div>

    {/* BODY */}
    <div style={{padding:"18px"}}>
      {loadError&&<div style={{background:"#1a0505",border:"1px solid #7f1d1d",borderRadius:9,padding:"10px 16px",marginBottom:14,display:"flex",alignItems:"flex-start",gap:10}}>
        <span style={{fontSize:16,flexShrink:0}}>❌</span>
        <div style={{flex:1}}>
          <div style={{color:"#f87171",fontWeight:700,fontSize:12,marginBottom:3}}>Errore connessione Supabase</div>
          <div style={{color:"#f87171",fontSize:11,fontFamily:"monospace",wordBreak:"break-all",opacity:.8}}>{String(loadError)}</div>
        </div>
        <button onClick={()=>load(true)} style={{background:"#f87171",color:"#fff",border:"none",borderRadius:6,padding:"5px 12px",cursor:"pointer",fontSize:11,fontWeight:700,flexShrink:0}}>Riprova</button>
      </div>}
      {view==="nuovo"&&<NuovoV onSave={addV} onCancel={()=>setView("lista")} op={op}/>}
      {view==="dettaglio"&&cur&&<Detail v={cur} onBack={()=>setView("lista")} onUpdate={updV} op={op}/>}
      {view==="lista"&&(veicoli.length===0
        ?<div style={{textAlign:"center",padding:"55px 0"}}>
          <div style={{fontSize:44,marginBottom:11}}>🚗</div>
          <div style={{color:loadError?"#f87171":"#475569",fontSize:15,marginBottom:4}}>{loadError?"❌ Errore connessione database":"Nessun veicolo in preconsegna"}</div>
          {loadError&&<div style={{background:"#1a0505",border:"1px solid #7f1d1d",borderRadius:8,padding:"10px 14px",margin:"0 auto 16px",maxWidth:400,textAlign:"left"}}>
            <div style={{color:"#f87171",fontSize:11,fontFamily:"monospace",wordBreak:"break-all"}}>{String(loadError)}</div>
          </div>}
          <div style={{color:"#334155",fontSize:11,marginBottom:20}}>{loadError?"Controlla la connessione e riprova":"Aggiungi il primo veicolo per iniziare"}</div>
          <button onClick={()=>setView("nuovo")} style={{background:"#F59E0B",color:"#000",border:"none",borderRadius:10,padding:"11px 28px",fontWeight:800,cursor:"pointer",fontSize:13}}>+ Aggiungi Veicolo</button>
        </div>
        :<>
          <AlertBanner veicoli={veicoli} onOpen={openV}/>
          <div style={{display:"flex",gap:5,marginBottom:14,overflowX:"auto",paddingBottom:3}}>
            <button onClick={()=>setFp("tutti")} style={{background:fp==="tutti"?"#1e2d3d":"#0f1621",border:`1px solid ${fp==="tutti"?"#475569":"#1e2d3d"}`,borderRadius:6,padding:"4px 11px",cursor:"pointer",color:fp==="tutti"?"#f8fafc":"#475569",fontWeight:fp==="tutti"?700:400,fontSize:10,whiteSpace:"nowrap",flexShrink:0}}>Tutti ({veicoli.length})</button>
            {POSIZIONI.map(p=>{const c=veicoli.filter(v=>v.posizione===p.id).length;if(!c)return null;return <button key={p.id} onClick={()=>setFp(p.id)} style={{background:fp===p.id?p.color+"33":"#0f1621",border:`1px solid ${fp===p.id?p.color:"#1e2d3d"}`,borderRadius:6,padding:"4px 11px",cursor:"pointer",color:fp===p.id?p.color:"#475569",fontWeight:fp===p.id?700:400,fontSize:10,whiteSpace:"nowrap",flexShrink:0}}>{p.icon} {p.label} ({c})</button>;})}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(340px,1fr))",gap:12}}>
            {filtered.map(v=><Card key={v.id} v={v} onOpen={()=>openV(v)} onDelete={()=>delV(v.id)} onArchivia={()=>archiviaV(v)}/>)}
          </div>
          {filtered.length===0&&<div style={{textAlign:"center",color:"#334155",padding:"32px 0",fontSize:12}}>Nessun veicolo in questa posizione</div>}
        </>
      )}
    </div>

    {/* CONFERMA ARCHIVIAZIONE */}
    {confirmArchivia&&<div style={{position:"fixed",inset:0,background:"#000000dd",display:"flex",alignItems:"center",justifyContent:"center",zIndex:400,padding:20}}>
      <div style={{background:"#0f1621",border:"1px solid #4c1d95",borderRadius:16,padding:28,width:"100%",maxWidth:380,textAlign:"center"}}>
        <div style={{fontSize:40,marginBottom:12}}>📦</div>
        <div style={{color:"#f8fafc",fontSize:17,fontWeight:800,marginBottom:8}}>Archiviare questo veicolo?</div>
        <div style={{color:"#F59E0B",fontFamily:"monospace",fontSize:16,fontWeight:900,marginBottom:4}}>{confirmArchivia.targa}</div>
        <div style={{color:"#94a3b8",fontSize:14,marginBottom:6}}>{confirmArchivia.veicolo}</div>
        <div style={{color:"#475569",fontSize:12,marginBottom:24}}>Il veicolo verrà spostato nell'archivio e rimosso dalla lista attiva. Potrai sempre consultare la scheda in futuro.</div>
        <div style={{display:"flex",gap:10,justifyContent:"center"}}>
          <button onClick={()=>setConfirmArchivia(null)}
            style={{background:"#1e2533",color:"#94a3b8",border:"1px solid #334155",borderRadius:9,padding:"10px 24px",cursor:"pointer",fontWeight:700,fontSize:14}}>
            Annulla
          </button>
          <button onClick={()=>doArchivia(confirmArchivia)}
            style={{background:"#8B5CF6",color:"#fff",border:"none",borderRadius:9,padding:"10px 24px",cursor:"pointer",fontWeight:700,fontSize:14}}>
            ✅ Sì, archivia
          </button>
        </div>
      </div>
    </div>}
    {/* ARCHIVIO MODAL */}
    {showArchivio&&<div style={{position:"fixed",inset:0,background:"#000000cc",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:20}}>
      <div style={{background:"#0f1621",border:"1px solid #4c1d95",borderRadius:16,padding:24,width:"100%",maxWidth:680,maxHeight:"90vh",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{color:"#a78bfa",fontFamily:"monospace",fontSize:10,letterSpacing:2}}>ARCHIVIO</div>
            <div style={{color:"#f8fafc",fontSize:16,fontWeight:800}}>Veicoli Venduti ({archivio.length})</div>
          </div>
          <button onClick={()=>setShowArchivio(false)} style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:20}}>✕</button>
        </div>
        <div style={{overflowY:"auto",flex:1}}>
          {archivio.length===0
            ?<div style={{color:"#475569",textAlign:"center",padding:"40px 0"}}>Nessun veicolo archiviato</div>
            :<table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead>
                <tr style={{borderBottom:"1px solid #1e2d3d"}}>
                  {["Targa","Veicolo","KM","Operatore","Archiviato il","Progresso"].map(h=>
                    <th key={h} style={{color:"#64748b",fontSize:10,fontFamily:"monospace",letterSpacing:1,padding:"6px 10px",textAlign:"left",whiteSpace:"nowrap"}}>{h}</th>
                  )}
                </tr>
              </thead>
              <tbody>
                {[...archivio].reverse().map((v,i)=>{
                  const pct=calcPct(v.checklist);
                  return <tr key={i} style={{borderBottom:"1px solid #0f1621",background:i%2===0?"transparent":"#0a0f1a",cursor:"pointer"}}
                    onClick={()=>{setSel(v);setShowArchivio(false);setView("dettaglio");}}>
                    <td style={{color:"#F59E0B",fontFamily:"monospace",fontWeight:800,fontSize:13,padding:"9px 10px"}}>{v.targa}</td>
                    <td style={{color:"#f8fafc",fontSize:12,padding:"9px 10px"}}>{v.veicolo}</td>
                    <td style={{color:"#64748b",fontSize:12,padding:"9px 10px"}}>{v.km||"—"}</td>
                    <td style={{color:"#64748b",fontSize:12,padding:"9px 10px"}}>{v.operatore||"—"}</td>
                    <td style={{color:"#a78bfa",fontSize:11,fontFamily:"monospace",padding:"9px 10px"}}>{v.archiviatoIl||"—"}</td>
                    <td style={{padding:"9px 10px"}}>
                      <div style={{display:"flex",alignItems:"center",gap:6}}>
                        <div style={{width:50,height:4,background:"#1e2533",borderRadius:3,overflow:"hidden"}}>
                          <div style={{height:"100%",width:`${pct}%`,background:pct===100?"#4ade80":pct>60?"#F59E0B":"#f87171",borderRadius:3}}/>
                        </div>
                        <span style={{color:"#64748b",fontSize:10,fontFamily:"monospace"}}>{pct}%</span>
                      </div>
                    </td>
                  </tr>;
                })}
              </tbody>
            </table>
          }
        </div>
        <div style={{color:"#475569",fontSize:11,textAlign:"center"}}>Clicca su un veicolo per vedere la scheda completa</div>
      </div>
    </div>}
    {/* EXPORT MODAL */}
    {showExport&&<div style={{position:"fixed",inset:0,background:"#000000cc",display:"flex",alignItems:"center",justifyContent:"center",zIndex:300,padding:20}}>
      <div style={{background:"#0f1621",border:"1px solid #334155",borderRadius:16,padding:24,width:"100%",maxWidth:600,maxHeight:"90vh",display:"flex",flexDirection:"column",gap:14}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div>
            <div style={{color:"#F59E0B",fontFamily:"monospace",fontSize:10,letterSpacing:2}}>DATABASE</div>
            <div style={{color:"#f8fafc",fontSize:16,fontWeight:800}}>Veicoli salvati ({veicoli.length})</div>
          </div>
          <button onClick={()=>setShowExport(false)} style={{background:"none",border:"none",color:"#475569",cursor:"pointer",fontSize:20}}>✕</button>
        </div>
        {/* TABELLA RIEPILOGO */}
        <div style={{overflowY:"auto",flex:1}}>
          {veicoli.length===0
            ? <div style={{color:"#475569",textAlign:"center",padding:"30px 0"}}>Nessun veicolo nel database</div>
            : <table style={{width:"100%",borderCollapse:"collapse"}}>
                <thead>
                  <tr style={{borderBottom:"1px solid #1e2d3d"}}>
                    {["Targa","Veicolo","KM","Posizione","Scadenza","Progresso","Creato da"].map(h=>
                      <th key={h} style={{color:"#64748b",fontSize:10,fontFamily:"monospace",letterSpacing:1,padding:"6px 10px",textAlign:"left",whiteSpace:"nowrap"}}>{h}</th>
                    )}
                  </tr>
                </thead>
                <tbody>
                  {veicoli.map((v,i)=>{
                    const pct=calcPct(v.checklist);
                    const pos=POSIZIONI.find(p=>p.id===v.posizione)||POSIZIONI[0];
                    return <tr key={v.id} style={{borderBottom:"1px solid #0f1621",background:i%2===0?"transparent":"#0a0f1a"}}>
                      <td style={{color:"#F59E0B",fontFamily:"monospace",fontWeight:800,fontSize:13,padding:"8px 10px"}}>{v.targa}</td>
                      <td style={{color:"#f8fafc",fontSize:12,padding:"8px 10px"}}>{v.veicolo}</td>
                      <td style={{color:"#64748b",fontSize:12,padding:"8px 10px"}}>{v.km||"—"}</td>
                      <td style={{padding:"8px 10px"}}><span style={{color:pos.color,fontSize:11}}>{pos.icon} {pos.label}</span></td>
                      <td style={{color:"#64748b",fontSize:11,fontFamily:"monospace",padding:"8px 10px"}}>{v.scadenza?new Date(v.scadenza).toLocaleDateString("it-IT"):"—"}</td>
                      <td style={{padding:"8px 10px"}}>
                        <div style={{display:"flex",alignItems:"center",gap:6}}>
                          <div style={{width:60,height:5,background:"#1e2533",borderRadius:3,overflow:"hidden"}}>
                            <div style={{height:"100%",width:`${pct}%`,background:pct===100?"#4ade80":pct>60?"#F59E0B":"#f87171",borderRadius:3}}/>
                          </div>
                          <span style={{color:"#64748b",fontSize:10,fontFamily:"monospace"}}>{pct}%</span>
                        </div>
                      </td>
                      <td style={{color:"#475569",fontSize:11,padding:"8px 10px"}}>{v.createdBy||"—"}</td>
                    </tr>;
                  })}
                </tbody>
              </table>
          }
        </div>
        {/* JSON copiabile */}
        <div>
          <div style={{color:"#475569",fontSize:10,fontFamily:"monospace",marginBottom:6}}>JSON COMPLETO (seleziona tutto e copia)</div>
          <textarea readOnly value={JSON.stringify({exportDate:new Date().toLocaleString("it-IT"),totale:veicoli.length,veicoli},null,2)}
            onClick={e=>e.target.select()}
            style={{width:"100%",height:100,background:"#070c14",border:"1px solid #1e2d3d",borderRadius:8,color:"#4ade80",fontSize:10,fontFamily:"monospace",padding:10,resize:"none",outline:"none",boxSizing:"border-box"}}/>
        </div>
      </div>
    </div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
  
  </script>
  <script>
    if("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js", {scope: "./"})
          .then(r => console.log("SW registered:", r.scope))
          .catch(e => console.log("SW error:", e.message));
      });
    }
  </script>
</body>
</html>
